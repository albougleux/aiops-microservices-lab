global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "telegraf-docker"
    static_configs:
      - targets: ["telegraf:9273"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
